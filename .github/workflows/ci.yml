name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Shell syntax (every harness script)
        run: |
          for f in $(find scripts .specify/scripts -name "*.sh"); do
            bash -n "$f" || exit 1
          done
          echo "all shell scripts parse"

      - name: JS syntax
        run: node --check scripts/kitchenloop/derive-coverage.mjs

      - name: Install dev dependencies
        run: npm install

      - name: Coverage-deriver tests
        run: npm test
